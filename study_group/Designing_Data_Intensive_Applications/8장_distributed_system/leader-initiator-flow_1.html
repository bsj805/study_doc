<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>LockRegistryLeaderInitiator Flow</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;600&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  h1 {
    font-size: 18px;
    font-weight: 700;
    color: #58a6ff;
    letter-spacing: 2px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .subtitle {
    font-size: 11px;
    color: #8b949e;
    margin-bottom: 40px;
    font-family: 'Noto Sans KR', sans-serif;
    letter-spacing: 1px;
  }

  svg {
    width: 100%;
    max-width: 960px;
    height: auto;
    overflow: visible;
  }

  /* animations */
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  @keyframes dash {
    to { stroke-dashoffset: -20; }
  }
  .flow-arrow {
    animation: dash 1.5s linear infinite;
  }
  .revoke-arrow {
    animation: dash 1.2s linear infinite;
  }
  .poll-pulse {
    animation: pulse 2s ease-in-out infinite;
  }
</style>
</head>
<body>

<h1>LockRegistryLeaderInitiator</h1>
<div class="subtitle">동작 흐름 다이어그램 — Granted / Revoked / Retry</div>

<svg viewBox="0 0 960 700" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- arrowheads -->
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#58a6ff"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3fb950"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f85149"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#d29922"/>
    </marker>
    <marker id="arrow-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#6e7681"/>
    </marker>

    <!-- glow filters -->
    <filter id="glow-blue">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-red">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ===== BACKGROUND SECTIONS ===== -->
  <!-- Granted zone -->
  <rect x="20" y="20" width="920" height="290" rx="12" fill="#0d2016" stroke="#238636" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="36" y="44" font-family="JetBrains Mono" font-size="11" fill="#3fb950" font-weight="700" letter-spacing="2">▶ GRANTED FLOW</text>

  <!-- Revoked zone -->
  <rect x="20" y="330" width="920" height="340" rx="12" fill="#1f0d0d" stroke="#da3633" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.7"/>
  <text x="36" y="354" font-family="JetBrains Mono" font-size="11" fill="#f85149" font-weight="700" letter-spacing="2">✕ REVOKED FLOW</text>

  <!-- ===== GRANTED FLOW ===== -->

  <!-- Node: App Start (SmartLifecycle) -->
  <rect x="40" y="60" width="160" height="60" rx="8" fill="#1c2128" stroke="#58a6ff" stroke-width="2" filter="url(#glow-blue)"/>
  <text x="120" y="85" font-family="JetBrains Mono" font-size="10" fill="#58a6ff" text-anchor="middle" font-weight="700">App Start</text>
  <text x="120" y="100" font-family="Noto Sans KR" font-size="9" fill="#8b949e" text-anchor="middle">SmartLifecycle</text>
  <text x="120" y="113" font-family="JetBrains Mono" font-size="8" fill="#6e7681" text-anchor="middle">autoStartup=true</text>

  <!-- Arrow: App Start → LeaderInitiator -->
  <line x1="200" y1="90" x2="248" y2="90" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow-blue)" class="flow-arrow" stroke-dasharray="5,3"/>

  <!-- Node: LeaderInitiator -->
  <rect x="250" y="60" width="160" height="60" rx="8" fill="#1c2128" stroke="#58a6ff" stroke-width="2.5" filter="url(#glow-blue)"/>
  <text x="330" y="85" font-family="JetBrains Mono" font-size="9.5" fill="#58a6ff" text-anchor="middle" font-weight="700">LeaderInitiator</text>
  <text x="330" y="100" font-family="JetBrains Mono" font-size="8" fill="#8b949e" text-anchor="middle">LockRegistry</text>
  <text x="330" y="112" font-family="JetBrains Mono" font-size="8" fill="#6e7681" text-anchor="middle">polling loop</text>

  <!-- Arrow: LeaderInitiator → tryLock -->
  <line x1="410" y1="90" x2="458" y2="90" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arrow-blue)" class="flow-arrow" stroke-dasharray="5,3"/>

  <!-- Node: Redis tryLock -->
  <rect x="460" y="60" width="150" height="60" rx="8" fill="#161b22" stroke="#d29922" stroke-width="2"/>
  <text x="535" y="84" font-family="JetBrains Mono" font-size="10" fill="#d29922" text-anchor="middle" font-weight="700">Redis</text>
  <text x="535" y="99" font-family="JetBrains Mono" font-size="9" fill="#8b949e" text-anchor="middle">tryLock()</text>
  <text x="535" y="113" font-family="JetBrains Mono" font-size="8" fill="#6e7681" text-anchor="middle">SET NX PX ttl</text>

  <!-- Decision diamond -->
  <polygon points="680,90 710,65 740,90 710,115" fill="#161b22" stroke="#d29922" stroke-width="2"/>
  <text x="710" y="86" font-family="JetBrains Mono" font-size="9" fill="#d29922" text-anchor="middle">Lock</text>
  <text x="710" y="98" font-family="JetBrains Mono" font-size="9" fill="#d29922" text-anchor="middle">OK?</text>

  <!-- Arrow: tryLock → diamond -->
  <line x1="610" y1="90" x2="676" y2="90" stroke="#d29922" stroke-width="1.5" marker-end="url(#arrow-yellow)"/>

  <!-- YES branch → OnGrantedEvent -->
  <line x1="740" y1="90" x2="798" y2="90" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="768" y="83" font-family="JetBrains Mono" font-size="9" fill="#3fb950" text-anchor="middle">YES</text>

  <rect x="800" y="60" width="140" height="60" rx="8" fill="#0d2016" stroke="#3fb950" stroke-width="2" filter="url(#glow-green)"/>
  <text x="870" y="84" font-family="JetBrains Mono" font-size="9.5" fill="#3fb950" text-anchor="middle" font-weight="700">OnGrantedEvent</text>
  <text x="870" y="99" font-family="JetBrains Mono" font-size="8.5" fill="#8b949e" text-anchor="middle">publishEvent()</text>
  <text x="870" y="113" font-family="JetBrains Mono" font-size="8" fill="#6e7681" text-anchor="middle">Leader elected ✓</text>

  <!-- Arrow: OnGrantedEvent → connectAllSites -->
  <line x1="870" y1="120" x2="870" y2="168" stroke="#3fb950" stroke-width="1.5" marker-end="url(#arrow-green)" stroke-dasharray="4,2" class="flow-arrow"/>

  <!-- Node: connectAllSites -->
  <rect x="800" y="170" width="140" height="55" rx="8" fill="#0d2016" stroke="#3fb950" stroke-width="1.5"/>
  <text x="870" y="193" font-family="JetBrains Mono" font-size="9" fill="#3fb950" text-anchor="middle" font-weight="700">connectAllSites()</text>
  <text x="870" y="207" font-family="JetBrains Mono" font-size="8" fill="#8b949e" text-anchor="middle">RobotBridge</text>
  <text x="870" y="219" font-family="JetBrains Mono" font-size="8" fill="#6e7681" text-anchor="middle">WebSocket connect</text>

  <!-- NO branch → Wait & Retry -->
  <line x1="710" y1="115" x2="710" y2="190" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arrow-gray)"/>
  <text x="722" y="160" font-family="JetBrains Mono" font-size="9" fill="#6e7681">NO</text>

  <rect x="620" y="192" width="180" height="55" rx="8" fill="#161b22" stroke="#6e7681" stroke-width="1.5"/>
  <text x="710" y="215" font-family="JetBrains Mono" font-size="9" fill="#8b949e" text-anchor="middle" font-weight="700">Wait &amp; Retry</text>
  <text x="710" y="229" font-family="JetBrains Mono" font-size="8" fill="#6e7681" text-anchor="middle">heartBeatMillis delay</text>
  <text x="710" y="241" font-family="JetBrains Mono" font-size="8" fill="#6e7681" text-anchor="middle">default: 10s</text>

  <!-- Retry loop back to LeaderInitiator -->
  <path d="M620,219 Q480,260 330,150 Q330,140 330,125" fill="none" stroke="#6e7681" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-gray)"/>
  <text x="450" y="275" font-family="JetBrains Mono" font-size="8" fill="#6e7681" text-anchor="middle">retry polling</text>

  <!-- ===== REVOKED FLOW ===== -->

  <!-- Revoke triggers label -->
  <text x="40" y="390" font-family="Noto Sans KR" font-size="10" fill="#8b949e">Revoke 트리거:</text>

  <!-- Node: Lock Expired -->
  <rect x="40" y="400" width="130" height="55" rx="8" fill="#1f0d0d" stroke="#f85149" stroke-width="1.5"/>
  <text x="105" y="422" font-family="JetBrains Mono" font-size="9" fill="#f85149" text-anchor="middle" font-weight="700">Lock Expired</text>
  <text x="105" y="436" font-family="JetBrains Mono" font-size="8" fill="#8b949e" text-anchor="middle">TTL 만료</text>
  <text x="105" y="448" font-family="JetBrains Mono" font-size="8" fill="#6e7681" text-anchor="middle">renew 실패</text>

  <!-- Node: shutdown() -->
  <rect x="40" y="470" width="130" height="50" rx="8" fill="#1f0d0d" stroke="#f85149" stroke-width="1.5"/>
  <text x="105" y="492" font-family="JetBrains Mono" font-size="9" fill="#f85149" text-anchor="middle" font-weight="700">shutdown()</text>
  <text x="105" y="506" font-family="JetBrains Mono" font-size="8" fill="#8b949e" text-anchor="middle">SmartLifecycle stop</text>

  <!-- Node: Network Partition -->
  <rect x="40" y="535" width="130" height="50" rx="8" fill="#1f0d0d" stroke="#f85149" stroke-width="1.5"/>
  <text x="105" y="557" font-family="JetBrains Mono" font-size="9" fill="#f85149" text-anchor="middle" font-weight="700">Network Issue</text>
  <text x="105" y="571" font-family="JetBrains Mono" font-size="8" fill="#8b949e" text-anchor="middle">Redis disconnect</text>

  <!-- Arrows from triggers → OnRevokedEvent -->
  <line x1="170" y1="427" x2="258" y2="450" stroke="#f85149" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <line x1="170" y1="495" x2="258" y2="465" stroke="#f85149" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <line x1="170" y1="560" x2="258" y2="475" stroke="#f85149" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- Node: OnRevokedEvent -->
  <rect x="260" y="420" width="150" height="65" rx="8" fill="#1f0d0d" stroke="#f85149" stroke-width="2.5" filter="url(#glow-red)"/>
  <text x="335" y="444" font-family="JetBrains Mono" font-size="9.5" fill="#f85149" text-anchor="middle" font-weight="700">OnRevokedEvent</text>
  <text x="335" y="459" font-family="JetBrains Mono" font-size="8.5" fill="#8b949e" text-anchor="middle">publishEvent()</text>
  <text x="335" y="473" font-family="JetBrains Mono" font-size="8" fill="#6e7681" text-anchor="middle">Leader revoked ✗</text>

  <!-- Arrow: OnRevokedEvent → closeSessions -->
  <line x1="410" y1="452" x2="468" y2="452" stroke="#f85149" stroke-width="1.5" marker-end="url(#arrow-red)" stroke-dasharray="4,2" class="revoke-arrow"/>

  <!-- Node: closeSessions -->
  <rect x="470" y="422" width="150" height="65" rx="8" fill="#1f0d0d" stroke="#f85149" stroke-width="1.5"/>
  <text x="545" y="446" font-family="JetBrains Mono" font-size="9" fill="#f85149" text-anchor="middle" font-weight="700">closeSessions()</text>
  <text x="545" y="460" font-family="JetBrains Mono" font-size="8" fill="#8b949e" text-anchor="middle">RobotBridge</text>
  <text x="545" y="474" font-family="JetBrains Mono" font-size="8" fill="#6e7681" text-anchor="middle">WebSocket close</text>

  <!-- Arrow: closeSessions → Release Lock -->
  <line x1="620" y1="452" x2="678" y2="452" stroke="#f85149" stroke-width="1.5" marker-end="url(#arrow-red)"/>

  <!-- Node: Release Lock -->
  <rect x="680" y="422" width="130" height="65" rx="8" fill="#161b22" stroke="#d29922" stroke-width="1.5"/>
  <text x="745" y="446" font-family="JetBrains Mono" font-size="9" fill="#d29922" text-anchor="middle" font-weight="700">Release Lock</text>
  <text x="745" y="460" font-family="JetBrains Mono" font-size="8" fill="#8b949e" text-anchor="middle">unlock()</text>
  <text x="745" y="474" font-family="JetBrains Mono" font-size="8" fill="#6e7681" text-anchor="middle">Redis DEL key</text>

  <!-- Node: Re-election Wait -->
  <rect x="470" y="530" width="150" height="60" rx="8" fill="#161b22" stroke="#6e7681" stroke-width="1.5"/>
  <text x="545" y="554" font-family="JetBrains Mono" font-size="9" fill="#8b949e" text-anchor="middle" font-weight="700">Re-election Wait</text>
  <text x="545" y="568" font-family="JetBrains Mono" font-size="8" fill="#6e7681" text-anchor="middle">busyWaitMillis delay</text>
  <text x="545" y="580" font-family="JetBrains Mono" font-size="8" fill="#6e7681" text-anchor="middle">default: 0ms</text>

  <!-- Arrow: Release Lock → Re-election Wait -->
  <line x1="745" y1="487" x2="745" y2="560" stroke="#6e7681" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="745" y1="560" x2="624" y2="560" stroke="#6e7681" stroke-width="1.5" marker-end="url(#arrow-gray)"/>

  <!-- BIG Arrow: Re-election → tryLock polling (back to granted flow) -->
  <path d="M545,530 Q545,490 545,475 Q545,400 330,400 Q330,380 330,145" 
        fill="none" stroke="#58a6ff" stroke-width="2" stroke-dasharray="6,3" 
        marker-end="url(#arrow-blue)" class="flow-arrow" opacity="0.8"/>
  <text x="415" y="510" font-family="Noto Sans KR" font-size="10" fill="#58a6ff" text-anchor="middle">재선출 시도</text>
  <text x="415" y="523" font-family="JetBrains Mono" font-size="9" fill="#58a6ff" text-anchor="middle">→ tryLock() polling 재개</text>

  <!-- ===== LEGEND ===== -->
  <rect x="20" y="620" width="920" height="60" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="40" y="642" font-family="JetBrains Mono" font-size="9" fill="#8b949e" font-weight="700">LEGEND</text>

  <line x1="100" y1="642" x2="130" y2="642" stroke="#3fb950" stroke-width="2"/>
  <circle cx="115" cy="642" r="3" fill="#3fb950"/>
  <text x="135" y="646" font-family="Noto Sans KR" font-size="9" fill="#8b949e">Granted 경로</text>

  <line x1="250" y1="642" x2="280" y2="642" stroke="#f85149" stroke-width="2"/>
  <circle cx="265" cy="642" r="3" fill="#f85149"/>
  <text x="285" y="646" font-family="Noto Sans KR" font-size="9" fill="#8b949e">Revoked 경로</text>

  <line x1="400" y1="642" x2="430" y2="642" stroke="#58a6ff" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="435" y="646" font-family="Noto Sans KR" font-size="9" fill="#8b949e">재시도 / 재선출</text>

  <line x1="560" y1="642" x2="590" y2="642" stroke="#d29922" stroke-width="2"/>
  <text x="595" y="646" font-family="Noto Sans KR" font-size="9" fill="#8b949e">Redis 연산</text>

  <line x1="680" y1="642" x2="710" y2="642" stroke="#6e7681" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="715" y="646" font-family="Noto Sans KR" font-size="9" fill="#8b949e">대기 / 실패</text>

  <!-- Lock icon near Redis node -->
  <text x="535" y="55" font-size="14" text-anchor="middle">🔑</text>
  <text x="870" y="55" font-size="14" text-anchor="middle">🟢</text>
  <text x="335" y="415" font-size="14" text-anchor="middle">🔴</text>
</svg>

</body>
</html>
